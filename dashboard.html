
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dashboard Excel Demo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
font-family: Arial;
background:#f4f6f8;
padding:40px;
}
.container{
width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h2{
text-align:center;
margin-bottom:30px;
}
</style>
</head>
<body>

<div class="container">
<h2>Dashboard Doanh Thu Theo Tháng</h2>
<canvas id="chart"></canvas>
</div>

<script>

async function loadData(){

let response = await fetch("data.csv");
let text = await response.text();

let rows = text.trim().split("\n");

let labels = [];
let values = [];

for(let i=1;i<rows.length;i++){

let cols = rows[i].split(",");

labels.push("Tháng " + cols[0]);
values.push(parseFloat(cols[1]));

}

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
label:"Doanh Thu",
data:values
}]
},

options:{
responsive:true
}

});

}

loadData();

</script>

</body>
</html>
